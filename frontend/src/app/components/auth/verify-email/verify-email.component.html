<div class="verify-container">
    <div class="verify-card">
        <div class="icon-section">
            <div class="otp-icon-bg">
                <i class="fas fa-shield-alt"></i>
            </div>
        </div>

        <h1>Email Verification</h1>
        <p class="subtitle">We've sent a 6-digit code to <strong>{{ email }}</strong></p>

        <form [formGroup]="otpForm" (ngSubmit)="onSubmit()" class="otp-form">
            <div class="input-group">
                <input type="text" formControlName="otp" placeholder="Enter 6-digit OTP" maxlength="6" pattern="\d*"
                    autocomplete="one-time-code"
                    [class.error]="otpForm.get('otp')?.invalid && otpForm.get('otp')?.touched">
                <div class="error-msg" *ngIf="otpForm.get('otp')?.invalid && otpForm.get('otp')?.touched">
                    Please enter a valid 6-digit code
                </div>
            </div>

            <button type="submit" [disabled]="otpForm.invalid || loading" class="btn btn-primary">
                <span *ngIf="!loading">Verify OTP</span>
                <mat-spinner diameter="20" *ngIf="loading"></mat-spinner>
            </button>
        </form>

        <div class="footer-links">
            <p>Didn't receive the code? <button class="btn-link" (click)="$event.preventDefault()">Resend</button></p>
            <a routerLink="/login" class="back-link"><i class="fas fa-arrow-left"></i> Back to Login</a>
        </div>
    </div>
</div>
